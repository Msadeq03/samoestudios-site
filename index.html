<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SAMOE STUDIOS — Architecture, Interiors & Delivery</title>
  <meta name="description" content="Select your preferred language to continue to SAMOE STUDIOS." />
  <link rel="canonical" href="https://samoestudios.com/" />
  <meta property="og:title" content="SAMOE STUDIOS — Architecture, Interiors & Delivery" />
  <meta property="og:description" content="Architecture, interiors, retail rollout systems, and implementation oversight." />
  <meta property="og:url" content="https://samoestudios.com/" />
  <meta property="og:type" content="website" />
  <link rel="stylesheet" href="./styles.css?v=200" />
</head>
<body class="gate-body">

  <main class="language-gate">

    <div class="gate-left reveal is-visible">
      <div class="gate-logo-bar">
        <span class="gate-logo-text">SAMOE STUDIOS</span>
      </div>

      <div class="gate-main">
        <div class="eyebrow eyebrow-dim">Select language</div>
        <h1 class="gate-headline" data-i18n="gate_title">
          Select<span>language</span>
        </h1>
        <p class="gate-sub" data-i18n="gate_sub">
          Choose your preferred language to continue.
        </p>
        <div class="gate-actions">
          <button class="btn btn-accent" id="chooseEN" type="button">English</button>
          <button class="btn btn-outline" id="chooseAR" type="button">العربية</button>
        </div>
      </div>

      <div class="gate-footer">
        <div class="gate-footer-item">
          <span>Headquarters</span>
          <strong>Erbil, Iraq</strong>
        </div>
        <div class="gate-footer-item">
          <span>Registered office</span>
          <strong>London, UK</strong>
        </div>
        <div class="gate-footer-item">
          <span>Focus</span>
          <strong>Architecture / Delivery</strong>
        </div>
      </div>
    </div>

    <div class="gate-right">
      <div class="gate-right-bg-text" aria-hidden="true">SAMOE</div>
      <div class="gate-services">
        <div class="gate-service-item">Architecture</div>
        <div class="gate-service-item">Interiors</div>
        <div class="gate-service-item">Delivery</div>
        <div class="gate-service-item">Retail Rollout</div>
        <div class="gate-service-item">Procurement</div>
        <div class="gate-service-item">Documentation</div>
      </div>
    </div>

  </main>

  <script src="./i18n.js?v=200"></script>
  <script>
    (function () {
      const KEY = "samoelang";
      try {
        const s = localStorage.getItem(KEY);
        if (s === "en" || s === "ar") location.replace("./home.html");
      } catch {}
      document.getElementById("chooseEN").addEventListener("click", function () {
        try { localStorage.setItem(KEY, "en"); } catch {}
        location.href = "./home.html";
      });
      document.getElementById("chooseAR").addEventListener("click", function () {
        try { localStorage.setItem(KEY, "ar"); } catch {}
        location.href = "./home.html";
      });
    })();
  </script>
</body>
</html>
