<!doctype html>
<html lang="en">
<head>
  <!-- =========================================================
       BASIC META
       ========================================================= -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- =========================================================
       SEO
       ========================================================= -->
  <title>Language — SAMOE STUDIOS</title>
  <meta
    name="description"
    content="Select your preferred language to continue to SAMOE STUDIOS."
  />
  <link rel="canonical" href="https://samoestudios.com/" />

  <!-- =========================================================
       FONTS
       ========================================================= -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Kufi+Arabic:wght@400;500;700;800&display=swap"
    rel="stylesheet"
  />

  <!-- =========================================================
       STYLES
       ========================================================= -->
  <link rel="stylesheet" href="./styles.css?v=108" />
</head>
<body class="gate-body">

  <!-- =========================================================
       LANGUAGE GATE
       ========================================================= -->
  <main class="language-gate">
    <section class="gate-shell reveal is-visible">
      <div class="gate-shell-left">
        <div class="eyebrow">SAMOE STUDIOS</div>
        <h1 class="gate-heading" data-i18n="gate_title">Select language</h1>
        <p class="gate-copy" data-i18n="gate_sub">
          Choose your preferred language to continue.
        </p>

        <div class="gate-actions">
          <button class="btn btn-accent" id="chooseEN" type="button">English</button>
          <button class="btn btn-outline" id="chooseAR" type="button">العربية</button>
        </div>
      </div>

      <div class="gate-shell-right">
        <div class="gate-brand-block">
          <div class="gate-brand-top">Architecture / Interiors / Delivery</div>
          <div class="gate-brand-name">SAMOE</div>
          <div class="gate-brand-bottom">MENA-based • International capability</div>
        </div>
      </div>
    </section>
  </main>

  <script src="./i18n.js?v=108"></script>
  <script>
    (function () {
      const STORAGE_KEY = "samoelang";

      try {
        const savedLang = localStorage.getItem(STORAGE_KEY);
        if (savedLang === "en" || savedLang === "ar") {
          location.replace("./home.html");
        }
      } catch (error) {
        console.warn("Language auto-redirect skipped:", error);
      }

      document.getElementById("chooseEN").addEventListener("click", () => {
        try {
          localStorage.setItem(STORAGE_KEY, "en");
        } catch (error) {}
        location.href = "./home.html";
      });

      document.getElementById("chooseAR").addEventListener("click", () => {
        try {
          localStorage.setItem(STORAGE_KEY, "ar");
        } catch (error) {}
        location.href = "./home.html";
      });
    })();
  </script>
</body>
</html>
