<!doctype html>
<html lang="en">
<head>
  <!-- =========================================================
       BASIC PAGE META
       ========================================================= -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- =========================================================
       SEO
       ========================================================= -->
  <title>Language — SAMOE STUDIOS</title>
  <meta
    name="description"
    content="Select your preferred language to continue to SAMOE STUDIOS."
  />
  <link rel="canonical" href="https://samoestudios.com/" />

  <!-- =========================================================
       FONTS
       ========================================================= -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Noto+Kufi+Arabic:wght@400;600;800&display=swap"
    rel="stylesheet"
  />

  <!-- =========================================================
       SITE STYLES
       ========================================================= -->
  <link rel="stylesheet" href="./styles.css?v=100" />
</head>

<body>
  <!-- =========================================================
       LANGUAGE GATE
       This is the first page users land on.
       If language is already saved, user is redirected to home.
       ========================================================= -->
  <main class="gate">
    <div class="gate-box reveal is-visible">
      <div class="kicker">SAMOE STUDIOS</div>

      <h1 class="gate-title" data-i18n="gate_title">Select language</h1>
      <p class="sub" style="margin-bottom: 18px;" data-i18n="gate_sub">
        Choose your preferred language to continue.
      </p>

      <div class="btn-row">
        <button class="btn btn-blue" id="chooseEN" type="button">English</button>
        <button class="btn btn-ghost" id="chooseAR" type="button">العربية</button>
      </div>
    </div>
  </main>

  <!-- =========================================================
       LANGUAGE SYSTEM
       ========================================================= -->
  <script src="./i18n.js?v=100"></script>

  <!-- =========================================================
       PAGE LOGIC
       - If a language is already saved, skip this page
       - Otherwise save selected language and continue to home
       ========================================================= -->
  <script>
    (function () {
      const STORAGE_KEY = "samoelang";

      try {
        const savedLang = localStorage.getItem(STORAGE_KEY);
        if (savedLang === "en" || savedLang === "ar") {
          location.replace("./home.html");
        }
      } catch (error) {
        console.warn("Language auto-redirect skipped:", error);
      }

      document.getElementById("chooseEN").addEventListener("click", () => {
        try {
          localStorage.setItem(STORAGE_KEY, "en");
        } catch (error) {
          console.warn("Could not save English language selection:", error);
        }
        location.href = "./home.html";
      });

      document.getElementById("chooseAR").addEventListener("click", () => {
        try {
          localStorage.setItem(STORAGE_KEY, "ar");
        } catch (error) {
          console.warn("Could not save Arabic language selection:", error);
        }
        location.href = "./home.html";
      });
    })();
  </script>
</body>
</html>
