<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SAMOE STUDIOS — Architecture, Interiors & Delivery</title>
  <meta name="description" content="Select your preferred language to continue to SAMOE STUDIOS." />
  <link rel="canonical" href="https://samoestudios.com/" />

  <meta property="og:title" content="SAMOE STUDIOS — Architecture, Interiors & Delivery" />
  <meta property="og:description" content="Architecture, interiors, retail rollout systems, and implementation oversight." />
  <meta property="og:url" content="https://samoestudios.com/" />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Kufi+Arabic:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css?v=109" />
</head>
<body class="gate-body">

  <main class="language-gate">
    <section class="gate-shell reveal is-visible">

      <div class="gate-shell-left">
        <div class="eyebrow">SAMOE STUDIOS</div>
        <h1 class="gate-heading" data-i18n="gate_title">Select language</h1>
        <p class="gate-copy" data-i18n="gate_sub">
          Choose your preferred language to continue.
        </p>
        <div class="gate-actions">
          <button class="btn btn-accent" id="chooseEN" type="button">English</button>
          <button class="btn btn-outline" id="chooseAR" type="button">العربية</button>
        </div>
      </div>

      <div class="gate-shell-right">
        <div class="gate-brand-block">
          <div class="gate-brand-top">Architecture / Interiors / Delivery</div>
          <div class="gate-brand-name">SAMOE</div>
          <div class="gate-brand-bottom">MENA-based • International capability</div>
        </div>
      </div>

    </section>
  </main>

  <script src="./i18n.js?v=109"></script>
  <script>
    (function () {
      const STORAGE_KEY = "samoelang";
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved === "en" || saved === "ar") {
          location.replace("./home.html");
        }
      } catch (e) {}

      document.getElementById("chooseEN").addEventListener("click", function () {
        try { localStorage.setItem(STORAGE_KEY, "en"); } catch (e) {}
        location.href = "./home.html";
      });

      document.getElementById("chooseAR").addEventListener("click", function () {
        try { localStorage.setItem(STORAGE_KEY, "ar"); } catch (e) {}
        location.href = "./home.html";
      });
    })();
  </script>
</body>
</html>
